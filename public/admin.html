<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Masters Pool 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<header>
  <div class="header-inner">
    <div class="header-title">
      <div class="logo">⛳</div>
      <h1>
        <span>2026 Masters Tournament</span>
        Pinehurst Golf Pool Admin
      </h1>
    </div>
    <nav class="header-nav">
      <a href="index.html">← View Standings</a>
    </nav>
  </div>
</header>

<!-- Password overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>Admin Access</h2>
    <p>Enter your admin password to manage pool teams.</p>
    <div class="form-group">
      <input type="password" id="passwordInput" placeholder="Password" autofocus
             style="text-align:center;font-size:1.1rem;letter-spacing:0.1em;">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Enter</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div class="status-bar" id="statusBar" style="display:none">
  Admin Mode &nbsp;·&nbsp; <span id="playerCountMsg">Loading golfer list…</span>
</div>

<main style="display:none" id="adminMain">

  <!-- Alert area -->
  <div id="alertArea"></div>

  <!-- Add / Edit team form -->
  <div class="card" id="formCard">
    <div class="card-header" id="formCardHeader">Add New Team</div>
    <div style="padding:20px">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Participant Name</label>
        <input type="text" id="ownerName" placeholder="e.g. John Smith">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Golfer 1</label>
          <input type="text" id="golfer1" list="golferList" placeholder="Type to search…">
        </div>
        <div class="form-group">
          <label>Golfer 2</label>
          <input type="text" id="golfer2" list="golferList" placeholder="Type to search…">
        </div>
        <div class="form-group">
          <label>Golfer 3</label>
          <input type="text" id="golfer3" list="golferList" placeholder="Type to search…">
        </div>
        <div class="form-group">
          <label>Golfer 4</label>
          <input type="text" id="golfer4" list="golferList" placeholder="Type to search…">
        </div>
        <div class="form-group">
          <label>Golfer 5</label>
          <input type="text" id="golfer5" list="golferList" placeholder="Type to search…">
        </div>
      </div>
      <datalist id="golferList"></datalist>
      <div id="golferWarning" style="font-family:Arial,sans-serif;font-size:0.82rem;color:orange;margin-bottom:12px;display:none"></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" onclick="saveTeam()">Save Team</button>
        <button class="btn btn-secondary" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Teams list -->
  <div class="card">
    <div class="card-header">All Teams (<span id="teamCount">0</span>)</div>
    <div id="teamsContainer">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>No teams yet. Add the first team above.</p>
      </div>
    </div>
  </div>

</main>

<footer>
  <a href="index.html">← Back to Pool Standings</a>
</footer>

<script>
let adminPassword = '';
let allGolfers = [];
let teams = [];

// ---- Auth ----
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function login() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (!pw) return;
  // Test the password against a protected endpoint
  const res = await fetch('/api/teams', { headers: { 'x-admin-password': pw } });
  if (res.status === 401) {
    document.getElementById('authError').textContent = 'Incorrect password. Try again.';
    return;
  }
  adminPassword = pw;
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('statusBar').style.display = '';
  document.getElementById('adminMain').style.display = '';
  init();
}

// ---- Init ----
async function init() {
  await Promise.all([loadGolfers(), loadTeams()]);
}

async function loadGolfers() {
  try {
    const res = await fetch('/api/leaderboard');
    const data = await res.json();
    allGolfers = (data.players || []).map(p => p.name).sort();
    const dl = document.getElementById('golferList');
    dl.innerHTML = allGolfers.map(n => `<option value="${escHtml(n)}">`).join('');
    const msg = allGolfers.length > 0
      ? `${allGolfers.length} golfers loaded from leaderboard — use autocomplete to pick names.`
      : 'Leaderboard not live yet — type golfer names manually (exact spelling matters).';
    document.getElementById('playerCountMsg').textContent = msg;
  } catch (e) {
    document.getElementById('playerCountMsg').textContent = 'Could not load golfer list.';
  }
}

async function loadTeams() {
  try {
    const res = await fetch('/api/teams', { headers: { 'x-admin-password': adminPassword } });
    teams = await res.json();
    renderTeams();
  } catch (e) {
    showAlert('Failed to load teams.', 'error');
  }
}

// ---- Render teams ----
function renderTeams() {
  document.getElementById('teamCount').textContent = teams.length;
  const container = document.getElementById('teamsContainer');
  if (teams.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No teams yet. Add the first team above.</p></div>`;
    return;
  }

  let html = `<table class="teams-admin-table">
    <thead>
      <tr>
        <th>Participant</th>
        <th>Golfer 1</th>
        <th>Golfer 2</th>
        <th>Golfer 3</th>
        <th>Golfer 4</th>
        <th>Golfer 5</th>
        <th></th>
      </tr>
    </thead>
    <tbody>`;

  teams.forEach(t => {
    html += `<tr>
      <td style="font-weight:bold">${escHtml(t.owner_name)}</td>
      <td>${escHtml(t.golfer1)}</td>
      <td>${escHtml(t.golfer2)}</td>
      <td>${escHtml(t.golfer3)}</td>
      <td>${escHtml(t.golfer4)}</td>
      <td>${escHtml(t.golfer5)}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary" onclick="editTeam(${t.id})">Edit</button>
        &nbsp;
        <button class="btn btn-danger" onclick="deleteTeam(${t.id}, '${escHtml(t.owner_name).replace(/'/g,"\\'")}')">Delete</button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ---- Validate golfer names against leaderboard ----
function warnUnknownGolfers() {
  if (allGolfers.length === 0) return; // can't validate before leaderboard loads
  const inputs = ['golfer1','golfer2','golfer3','golfer4','golfer5'];
  const unknown = inputs
    .map(id => document.getElementById(id).value.trim())
    .filter(n => n && !allGolfers.some(g => g.toLowerCase() === n.toLowerCase()));
  const warn = document.getElementById('golferWarning');
  if (unknown.length > 0) {
    warn.style.display = '';
    warn.textContent = `⚠ Not found in current leaderboard: ${unknown.join(', ')}. Spelling must match exactly.`;
  } else {
    warn.style.display = 'none';
  }
}

['golfer1','golfer2','golfer3','golfer4','golfer5'].forEach(id => {
  document.getElementById(id).addEventListener('change', warnUnknownGolfers);
});

// ---- Save team ----
async function saveTeam() {
  const id        = document.getElementById('editId').value;
  const ownerName = document.getElementById('ownerName').value.trim();
  const golfer1   = document.getElementById('golfer1').value.trim();
  const golfer2   = document.getElementById('golfer2').value.trim();
  const golfer3   = document.getElementById('golfer3').value.trim();
  const golfer4   = document.getElementById('golfer4').value.trim();
  const golfer5   = document.getElementById('golfer5').value.trim();

  if (!ownerName || !golfer1 || !golfer2 || !golfer3 || !golfer4 || !golfer5) {
    showAlert('All fields are required.', 'error');
    return;
  }

  // Check for duplicate golfer selection
  const picks = [golfer1, golfer2, golfer3, golfer4, golfer5];
  const unique = new Set(picks.map(p => p.toLowerCase()));
  if (unique.size < 5) {
    showAlert('Each golfer must be unique — you have a duplicate.', 'error');
    return;
  }

  const body = { owner_name: ownerName, golfer1, golfer2, golfer3, golfer4, golfer5 };
  const url    = id ? `/api/teams/${id}` : '/api/teams';
  const method = id ? 'PUT' : 'POST';

  try {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      showAlert(data.error || 'Failed to save team.', 'error');
      return;
    }
    showAlert(id ? 'Team updated!' : 'Team added!', 'success');
    clearForm();
    loadTeams();
  } catch (e) {
    showAlert('Network error saving team.', 'error');
  }
}

// ---- Edit / Delete ----
function editTeam(id) {
  const t = teams.find(x => x.id === id);
  if (!t) return;
  document.getElementById('editId').value   = t.id;
  document.getElementById('ownerName').value = t.owner_name;
  document.getElementById('golfer1').value   = t.golfer1;
  document.getElementById('golfer2').value   = t.golfer2;
  document.getElementById('golfer3').value   = t.golfer3;
  document.getElementById('golfer4').value   = t.golfer4;
  document.getElementById('golfer5').value   = t.golfer5;
  document.getElementById('formCardHeader').textContent = 'Edit Team — ' + t.owner_name;
  document.getElementById('cancelEditBtn').style.display = '';
  document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
  clearForm();
}

function clearForm() {
  document.getElementById('editId').value    = '';
  document.getElementById('ownerName').value = '';
  document.getElementById('golfer1').value   = '';
  document.getElementById('golfer2').value   = '';
  document.getElementById('golfer3').value   = '';
  document.getElementById('golfer4').value   = '';
  document.getElementById('golfer5').value   = '';
  document.getElementById('formCardHeader').textContent = 'Add New Team';
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('golferWarning').style.display = 'none';
}

async function deleteTeam(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await fetch(`/api/teams/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': adminPassword },
    });
    showAlert('Team deleted.', 'success');
    loadTeams();
  } catch (e) {
    showAlert('Failed to delete team.', 'error');
  }
}

// ---- Alerts ----
function showAlert(msg, type) {
  const area = document.getElementById('alertArea');
  area.innerHTML = `<div class="alert alert-${type}">${escHtml(msg)}</div>`;
  setTimeout(() => { area.innerHTML = ''; }, 4000);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
